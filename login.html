<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindBloom | Login</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="page-shell auth-page">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">MindBloom</a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="index.html">Home</a>
          <a href="signup.html">Sign Up</a>
        </nav>
      </div>
    </header>

    <main class="container auth-container">
      <section class="glass-card auth-card">
        <span class="eyebrow">Welcome back</span>
        <h1>Login to your sanctuary</h1>
        <p>Access your wellness dashboard, check-ins, and calm guidance.</p>

        <form class="auth-form">
          <label>
            Email
            <input type="email" placeholder="you@example.com" required />
          </label>
          <label>
            Password
            <input type="password" placeholder="••••••••" required />
          </label>
          <button class="button button-primary" type="submit">Login</button>
          <a class="link-muted" href="#">Forgot password?</a>
        </form>

        <div class="divider"><span>or continue with</span></div>
        <button class="button button-outline google-button">Continue with Google</button>

        <p class="auth-note">New here? <a href="signup.html">Create an account</a></p>
      </section>
    </main>

    <footer class="site-footer simple-footer">
      <p>© <span id="year-alt"></span> MindBloom</p>
    </footer>
  </div>
  <script src="assets/js/main.js"></script>
</body>
</html>
